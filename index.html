<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Scroll Invitation</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* ตั้งค่าพื้นฐาน */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', 'Sarabun', sans-serif;
            background-color: #111; /* สีพื้นหลังโทนเข้ม หรูหรา */
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth; /* เลื่อนจอแบบนุ่มนวล */
        }

        /* แบ่งหน้าเว็บเป็นส่วนๆ (Section) ให้เต็มจอ */
        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        /* ตกแต่งสีทอง */
        .text-gold { color: #d4af37; }
        h1 { font-size: 2.5em; margin-bottom: 10px; letter-spacing: 2px; }
        h2 { font-size: 2em; margin-bottom: 20px; font-weight: 300; }
        p { font-size: 1.1em; line-height: 1.8; color: #ccc; }

        /* ปุ่มและฟอร์ม */
        .btn {
            background-color: #d4af37;
            color: #111;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            margin-top: 20px;
        }
        .btn:hover { background-color: #f3c63e; transform: translateY(-3px); }
        
        .input-field {
            padding: 15px; 
            width: 100%; 
            max-width: 300px;
            margin-bottom: 15px; 
            border: 1px solid #444; 
            background: #222;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }

        /* สัญลักษณ์ลูกศรเลื่อนลง */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            animation: bounce 2s infinite;
            color: #d4af37;
            font-size: 14px;
            letter-spacing: 1px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>

    <section id="cover" style="background: radial-gradient(circle, #2a0808 0%, #000000 100%);">
        <div data-aos="fade-down" data-aos-duration="1500">
            <h3 class="text-gold" style="font-weight: 300;">THE WEDDING OF</h3>
        </div>
        <div data-aos="zoom-in" data-aos-duration="2000" data-aos-delay="500">
            <h1 class="text-gold">ธนา & นฤมล</h1>
        </div>
        <div data-aos="fade-up" data-aos-duration="1500" data-aos-delay="1000">
            <p>15 . 05 . 2026</p>
        </div>
        
        <div class="scroll-indicator" data-aos="fade-in" data-aos-delay="2000">
            เลื่อนลงเพื่อดูรายละเอียด<br>↓
        </div>
    </section>

    <section id="details" style="background-color: #1a1a1a;">
        <div data-aos="fade-up" data-aos-duration="1000">
            <h2 class="text-gold">กำหนดการ</h2>
        </div>
        
        <div data-aos="fade-up" data-aos-duration="1000" data-aos-delay="200" style="background: #222; padding: 30px; border-radius: 15px; border: 1px solid #333; max-width: 350px;">
            <p><b class="text-gold">วันศุกร์ที่ 15 พฤษภาคม 2026</b></p>
            <p>09:09 น. - พิธีมงคลสมรส<br>
               12:00 น. - ร่วมรับประทานอาหาร</p>
            <p>ณ ห้องบอลรูม โรงแรมแกรนด์พรีเมียม</p>
            
            <button class="btn" onclick="window.open('https://maps.google.com', '_blank')" style="font-size: 14px; padding: 10px 20px;">เปิดแผนที่ (Google Maps)</button>
        </div>
    </section>

    <section id="rsvp" style="background: radial-gradient(circle, #111 0%, #000 100%);">
        <div data-aos="zoom-in" data-aos-duration="1000">
            <h2 class="text-gold">ยืนยันการเข้าร่วมงาน</h2>
            <p>กรุณาตอบรับภายในวันที่ 1 พฤษภาคม</p>
        </div>

        <div id="rsvpForm" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300" style="margin-top: 30px; width: 100%;">
            <input type="text" id="guestName" class="input-field" placeholder="กรอกชื่อ - นามสกุลแขก">
            <br>
            <button class="btn" onclick="submitForm()">ยืนยันเข้าร่วมงาน</button>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // เริ่มต้นการทำงานของระบบ Animation ตอน Scroll
        AOS.init({
            once: false, // เลื่อนขึ้นลงก็จะเห็น Animation ซ้ำ (ถ้าอยากให้เล่นครั้งเดียวเปลี่ยนเป็น true)
            mirror: true // อนิเมชันทำงานตอนเลื่อนกลับด้วย
        });

        // ฟังก์ชันจำลองเมื่อกดปุ่มยืนยัน
        function submitForm() {
            const name = document.getElementById('guestName').value.trim();
            if(!name) {
                alert('กรุณากรอกชื่อก่อนกดยืนยันครับ');
                return;
            }

            const rsvpDiv = document.getElementById('rsvpForm');
            rsvpDiv.style.opacity = 0; // เฟดฟอร์มออก
            rsvpDiv.style.transition = "opacity 0.5s";
            
            setTimeout(() => {
                // เปลี่ยนเป็นหน้าขอบคุณ
                rsvpDiv.innerHTML = `
                    <h3 style="color: #d4af37; margin-bottom: 10px;">ขอบคุณครับ</h3>
                    <p>เราได้รับคำตอบรับจากคุณ<br><b style="color:white; font-size: 1.2em;">${name}</b> เรียบร้อยแล้ว</p>
                    <p style="color: #888; font-size: 14px;">แล้วพบกันในวันงานนะครับ</p>
                `;
                rsvpDiv.style.opacity = 1; // เฟดข้อความกลับเข้ามา
            }, 500);
        }
    </script>
</body>
</html>
