<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Invitation Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a; /* เปลี่ยนพื้นหลังเป็นสีเข้มให้เข้ากับความหรูหราของคลิป */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .card-container {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            color: #fff;
            /* Animation เริ่มต้น */
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
        }
        .card-container.show {
            opacity: 1;
            transform: translateY(0);
        }
        /* ส่วนสำหรับฝังวิดีโอแนวตั้ง (Shorts) ให้พอดีมือถือ */
        .video-wrapper {
            position: relative;
            padding-bottom: 177.77%; /* สัดส่วน 16:9 แนวตั้ง */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        h2 { color: #d4af37; font-weight: 300; letter-spacing: 1px; margin-bottom: 5px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        .btn {
            background-color: #d4af37; /* สีทอง */
            color: #1a1a1a;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #b5952f; }
        .input-field {
            padding: 12px; 
            width: 85%; 
            margin-bottom: 15px; 
            border: 1px solid #444; 
            background: #333;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
        .input-field::placeholder { color: #888; }
    </style>
</head>
<body>

    <div class="card-container" id="invitationCard">
        
        <!-- ฝังวิดีโอ YouTube ตรงนี้ (ดึง ID ของวิดีโอมาใส่) -->
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/oPobNHuwZ-I?autoplay=1&loop=1&playlist=oPobNHuwZ-I&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <h2>ขอเรียนเชิญ</h2>
        <p>เพื่อทดสอบระบบ RSVP แบบมีวิดีโอประกอบ</p>
        
        <input type="text" id="guestName" class="input-field" placeholder="กรุณากรอกชื่อ-นามสกุล">
        <br>
        <button class="btn" onclick="submitRSVP('Attending')">ยืนยันการเข้าร่วม</button>
    </div>

    <script>
        // ทำให้การ์ด Smooth Fade-up เมื่อเปิดหน้าเว็บ
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('invitationCard').classList.add('show');
            }, 200);
        };

        async function submitRSVP(status) {
            const name = document.getElementById('guestName').value.trim();
            if(!name) {
                alert('กรุณากรอกชื่อก่อนกดยืนยันครับ');
                return;
            }

            // ถ้าคุณตั้งค่า Google Apps Script ไว้แล้ว เอา URL มาใส่ตรงนี้ได้เลยเพื่อเทสต์ส่งข้อมูล
            const gasUrl = 'YOUR_GAS_WEBAPP_URL_HERE'; 

            const btn = document.querySelector('.btn');
            btn.innerHTML = 'กำลังบันทึก...';
            btn.disabled = true;

            // จำลองการส่งข้อมูล (ถ้าใส่ gasUrl จริง ให้เอาโค้ด fetch มาเปิดใช้งาน)
            setTimeout(() => {
                const card = document.getElementById('invitationCard');
                card.style.opacity = 0; 
                
                setTimeout(() => {
                    card.innerHTML = `
                        <h2 style="color: #d4af37; margin-bottom: 10px; margin-top: 50px;">ขอบคุณครับ</h2>
                        <p style="font-size: 18px; color: #fff;">ระบบได้รับข้อมูลของ<br><b style="color:#d4af37;">${name}</b> เรียบร้อยแล้ว</p>
                        <p style="margin-top: 20px; color: #aaa;">นี่คือการทดสอบระบบ Demo สำเร็จ!</p>
                    `;
                    card.style.opacity = 1; 
                }, 500);
            }, 1000);
        }
    </script>
</body>
</html>
