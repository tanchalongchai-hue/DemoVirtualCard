<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fcf9f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .card-container {
            background: white;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 400px;
            /* Animation เริ่มต้น */
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
        }
        .card-container.show {
            opacity: 1;
            transform: translateY(0);
        }
        h1 { color: #333; font-weight: 300; letter-spacing: 2px; }
        p { color: #666; line-height: 1.6; }
        .btn {
            background-color: #c9a063;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #b08953; }
        .input-field {
            padding: 12px; 
            width: 80%; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card-container" id="invitationCard">
        <h1>YOU'RE INVITED</h1>
        <p>ขอเรียนเชิญร่วมงานเลี้ยงฉลอง<br>วันเสาร์ที่ 25 พฤษภาคม 2026</p>
        
        <input type="text" id="guestName" class="input-field" placeholder="กรุณากรอกชื่อ-นามสกุล">
        <br>
        <button class="btn" onclick="submitRSVP('Attending')">ยืนยันการเข้าร่วม</button>
    </div>

    <script>
        // ทำให้การ์ด Smooth Fade-up เมื่อเปิดหน้าเว็บ
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('invitationCard').classList.add('show');
            }, 200);
        };

        async function submitRSVP(status) {
            const name = document.getElementById('guestName').value.trim();
            if(!name) {
                alert('กรุณากรอกชื่อก่อนกดยืนยันครับ');
                return;
            }

            // นำ URL Web App ของ GAS มาวางตรงนี้
            const gasUrl = 'https://script.google.com/macros/s/AKfycbxDZhXDWWVhr57hH_0wP25lY-QpyVaG6O_EENDvmnLJNravkllHhcX7RLhI_bQZEft-bg/exec'; 

            const btn = document.querySelector('.btn');
            btn.innerHTML = 'กำลังบันทึก...';
            btn.disabled = true;

            try {
                // ส่งข้อมูลไปที่ GAS (ไม่ต้องมี userId จาก LINE แล้ว)
                // เรากำหนด userId เป็น 'Web_User' แทน เพื่อให้โครงสร้างข้อมูลตรงกับ GAS เดิม
                await fetch(gasUrl, {
                    method: 'POST',
                    body: JSON.stringify({ name: name, status: status, userId: 'Web_User' })
                });
                
                // เมื่อบันทึกสำเร็จ เปลี่ยน UI ในการ์ดเป็นหน้าขอบคุณแบบ Smooth
                const card = document.getElementById('invitationCard');
                card.style.opacity = 0; // เฟดออก
                
                setTimeout(() => {
                    card.innerHTML = `
                        <h2 style="color: #c9a063; margin-bottom: 10px;">ขอบคุณครับ</h2>
                        <p style="font-size: 18px;">ระบบได้รับข้อมูลการยืนยันเข้าร่วมงานของ<br><b>${name}</b> เรียบร้อยแล้ว</p>
                        <p style="margin-top: 20px; color: #888;">แล้วพบกันในวันงานนะครับ</p>
                    `;
                    card.style.opacity = 1; // เฟดหน้าขอบคุณกลับเข้ามา
                }, 500);

            } catch (error) {
                console.error('Error:', error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้งครับ');
                btn.innerHTML = 'ยืนยันการเข้าร่วม';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
